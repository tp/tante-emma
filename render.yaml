# Render Blueprint — one Web Service (starter) + one managed Postgres (smallest paid).
# Web service is on starter (not free) so it never spins down — a cold start mid-demo
# would mean a 30s+ delay on the first request from claude.ai / WhatsApp.
# DB is on a paid plan because the free Postgres slot is in use by another project
# (Render allows only one free Postgres per account).
#
# Migrations run at startup (src/db/migrate.ts), NOT in buildCommand, and are
# fire-and-forget: a DB hiccup logs but never crashes the process, so /healthz
# and the MCP `ping` keep serving (the M0 risk guarantee). Migration SQL lives in
# drizzle/ and is generated from src/db/schema.ts via `pnpm db:generate`.

databases:
  - name: tante-emma-db
    plan: basic-256mb
    region: frankfurt
    databaseName: tante_emma
    user: tante_emma

services:
  - type: web
    name: tante-emma
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: tante-emma-db
          property: connectionString
      - key: PUBLIC_BASE_URL
        sync: false # set to https://<service>.onrender.com after first deploy
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
